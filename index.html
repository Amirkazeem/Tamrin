<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Amitis - تمرین تشخیص روند</title>
    <style>
        /* ===== استایل‌های اصلی ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            min-height: 100vh;
            background: #0a0a0a;
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            direction: rtl;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.4s ease;
        }
        body.light-mode {
            background: #e0e0e0;
        }

        .glass-main {
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            background: #111111;
            padding: 24px 14px 40px;
            border-left: 1px solid #1a1a1a;
            border-right: 1px solid #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.4s ease, border-color 0.4s ease;
        }
        body.light-mode .glass-main {
            background: #f0f0f0;
            border-color: #ccc;
        }

        /* ===== دکمه تم ===== */
        .top-buttons {
            display: flex;
            justify-content: flex-end;
            padding: 0 10px 12px 10px;
            position: relative;
            z-index: 10;
        }
        .theme-toggle-btn {
            pointer-events: auto;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            touch-action: manipulation;
            user-select: none;
            border-color: rgba(255, 255, 255, 0.2);
        }
        .theme-toggle-btn:hover {
            transform: scale(1.05);
            border-color: #fff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }
        body.light-mode .theme-toggle-btn {
            background: rgba(240, 240, 240, 0.85);
            border-color: rgba(0, 0, 0, 0.15);
            color: #222;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        body.light-mode .theme-toggle-btn:hover {
            border-color: #000;
        }

        /* ===== هدر ===== */
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px 20px;
            margin-bottom: 55px;
            gap: 10px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }
        .header:hover {
            border-color: #ffffff !important;
            box-shadow: 0 8px 50px rgba(0, 0, 0, 0.4) !important;
            transform: translateY(-2px);
        }
        body.light-mode .header {
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.08);
        }
        body.light-mode .header:hover {
            border-color: #000 !important;
            box-shadow: 0 8px 50px rgba(0, 0, 0, 0.08) !important;
        }

        .brand {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #000000, #890913, #000000, #890913);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: cyberGlitch 3s ease-in-out infinite alternate;
            font-weight: 600;
        }
        @keyframes cyberGlitch {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .level-display {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #aaa;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 14px 4px 10px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(4px);
            margin-bottom: 20px;
            align-self: flex-start;
            transition: all 0.3s ease;
        }
        body.light-mode .level-display {
            color: #333;
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.08);
        }
        .level-display .level-label {
            font-weight: 300;
            font-size: 11px;
            color: #888;
        }
        body.light-mode .level-display .level-label {
            color: #666;
        }
        .level-display .level-name {
            font-weight: 700;
            font-size: 15px;
            color: #ffffff;
        }
        body.light-mode .level-display .level-name {
            color: #000;
        }
        .level-display .level-progress {
            font-size: 10px;
            color: #555;
        }
        body.light-mode .level-display .level-progress {
            color: #888;
        }

        /* ===== بقیه استایل‌ها ===== */
        .item {
            margin-bottom: 30px;
            padding-bottom: 20px;
            flex: 1;
        }
        .chart-box {
            background: #141414;
            border-radius: 16px;
            padding: 10px 10px 8px;
            border: 1px solid #2a2a2a;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        body.light-mode .chart-box {
            background: #f8f8f8;
            border-color: #ccc;
        }
        .chart-box:hover {
            border-color: #ffffff !important;
            transform: translateY(-8px) scale(1.005);
            background: #1e1e1e !important;
            box-shadow: 0 16px 60px rgba(0, 0, 0, 0.7) !important;
        }
        body.light-mode .chart-box:hover {
            border-color: #000 !important;
            background: #fff !important;
            box-shadow: 0 16px 60px rgba(0, 0, 0, 0.1) !important;
        }
        .chart-box.answer-box {
            margin-top: 100px;
            background: #161616;
            border-color: #323232;
        }
        body.light-mode .chart-box.answer-box {
            background: #f0f0f0;
            border-color: #bbb;
        }

        .label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .label .title {
            font-size: 14px;
            font-weight: 700;
            color: #aaa;
        }
        body.light-mode .label .title {
            color: #555;
        }
        .label .badge {
            font-size: 9px;
            color: #333;
            background: #1a1a1a;
            padding: 2px 12px;
            border-radius: 30px;
            border: 1px solid #222;
        }
        body.light-mode .label .badge {
            background: #e0e0e0;
            border-color: #ccc;
            color: #666;
        }
        .label .badge.trend-up {
            color: #000eff !important;
            border-color: #000eff !important;
            background: rgba(0, 14, 255, 0.08) !important;
            animation: neonBlue 1.2s ease-in-out infinite alternate !important;
        }
        .label .badge.trend-down {
            color: #890913 !important;
            border-color: #890913 !important;
            background: rgba(137, 9, 19, 0.08) !important;
            animation: neonRed 1.2s ease-in-out infinite alternate !important;
        }
        .label .badge.trend-range {
            color: #ff9b00 !important;
            border-color: #ff9b00 !important;
            background: rgba(255, 155, 0, 0.08) !important;
            animation: neonOrange 1.2s ease-in-out infinite alternate !important;
        }

        @keyframes neonBlue {
            0% {
                text-shadow: 0 0 5px #000eff, 0 0 10px #000eff;
                opacity: 0.7;
            }
            100% {
                text-shadow: 0 0 15px #000eff, 0 0 30px #000eff, 0 0 60px #000eff;
                opacity: 1;
            }
        }
        @keyframes neonRed {
            0% {
                text-shadow: 0 0 5px #890913, 0 0 10px #890913;
                opacity: 0.7;
            }
            100% {
                text-shadow: 0 0 15px #890913, 0 0 30px #890913, 0 0 60px #890913;
                opacity: 1;
            }
        }
        @keyframes neonOrange {
            0% {
                text-shadow: 0 0 5px #ff9b00, 0 0 10px #ff9b00;
                opacity: 0.7;
            }
            100% {
                text-shadow: 0 0 15px #ff9b00, 0 0 30px #ff9b00, 0 0 60px #ff9b00;
                opacity: 1;
            }
        }

        .toolbar {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .toolbar button {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #666;
            padding: 3px 12px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            touch-action: manipulation;
            user-select: none;
        }
        body.light-mode .toolbar button {
            background: #e8e8e8;
            border-color: #ccc;
            color: #555;
        }
        .toolbar button:hover {
            background: #2a2a2a;
            border-color: #444;
            color: #aaa;
        }
        body.light-mode .toolbar button:hover {
            background: #d0d0d0;
            border-color: #999;
            color: #222;
        }
        .toolbar button.active {
            background: #2a2a2a;
            border-color: #ffffff;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }
        body.light-mode .toolbar button.active {
            background: #ccc;
            border-color: #000;
            color: #000;
        }

        .exercise-counter-inline {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: #666;
            user-select: none;
            white-space: nowrap;
        }
        .exercise-counter-inline .counter-number {
            color: #ffffff;
            font-weight: 400;
            font-size: 13px;
            min-width: 18px;
            text-align: center;
        }
        body.light-mode .exercise-counter-inline .counter-number {
            color: #000;
        }

        .record-item-inline {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 3px 10px 3px 8px;
            font-size: 11px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }
        body.light-mode .record-item-inline {
            background: #e8e8e8;
            border-color: #ccc;
            color: #555;
        }
        .record-item-inline:hover {
            background: #252525;
            border-color: #444;
        }
        body.light-mode .record-item-inline:hover {
            background: #d0d0d0;
            border-color: #999;
        }
        .record-item-inline .record-value-white {
            font-weight: 700;
            font-size: 14px;
            min-width: 20px;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 0 8px #ffffff, 0 0 20px #aaaaaa, 0 0 40px #888888;
            animation: whitePulse 1.5s ease-in-out infinite alternate;
        }
        body.light-mode .record-item-inline .record-value-white {
            color: #000;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.2);
            animation: none;
        }
        @keyframes whitePulse {
            0% {
                text-shadow: 0 0 4px #ffffff, 0 0 10px #aaaaaa, 0 0 20px #888888;
                opacity: 0.85;
            }
            100% {
                text-shadow: 0 0 12px #ffffff, 0 0 30px #cccccc, 0 0 60px #aaaaaa, 0 0 80px #888888;
                opacity: 1;
            }
        }

        .new-record-badge-inline {
            display: none;
            font-size: 11px;
            font-weight: 700;
            color: #ffdd00;
            text-shadow: 0 0 8px #ffdd00, 0 0 20px #ffaa00, 0 0 40px #ff8800, 0 0 80px #ff6600;
            animation: neonPulseGold 0.7s ease-in-out infinite alternate;
            letter-spacing: 1px;
            padding: 2px 10px;
            border-radius: 6px;
            background: rgba(255, 215, 0, 0.04);
            border: 1px solid rgba(255, 215, 0, 0.12);
        }
        .new-record-badge-inline.show {
            display: inline-block;
        }
        @keyframes neonPulseGold {
            0% {
                text-shadow: 0 0 4px #ffdd00, 0 0 10px #ffaa00, 0 0 20px #ff8800, 0 0 40px #ff6600;
                opacity: 0.8;
                transform: scale(0.98);
            }
            100% {
                text-shadow: 0 0 12px #ffdd00, 0 0 30px #ffaa00, 0 0 60px #ff8800, 0 0 100px #ff6600, 0 0 140px #ff4400;
                opacity: 1;
                transform: scale(1.02);
            }
        }
        .toolbar-divider {
            color: #2a2a2a;
            font-size: 14px;
            font-weight: 100;
            padding: 0 2px;
            user-select: none;
        }
        body.light-mode .toolbar-divider {
            color: #ccc;
        }

        .spoiler-btn {
            background: transparent;
            border: 1px solid #ffffff;
            color: #ffffff;
            padding: 5px 16px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            touch-action: manipulation;
            user-select: none;
            margin-top: 4px;
            width: 100%;
            text-align: center;
            letter-spacing: 0.5px;
        }
        body.light-mode .spoiler-btn {
            border-color: #333;
            color: #333;
        }
        .spoiler-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #aaaaaa;
            color: #ffffff;
        }
        body.light-mode .spoiler-btn:hover {
            background: rgba(0, 0, 0, 0.05);
            border-color: #666;
            color: #000;
        }
        .spoiler-btn.active {
            background: rgba(255, 255, 255, 0.03);
            border-color: #ffffff;
            color: #ffffff;
        }
        body.light-mode .spoiler-btn.active {
            background: rgba(0, 0, 0, 0.05);
            border-color: #000;
            color: #000;
        }
        .spoiler-content {
            display: none;
            margin-top: 8px;
            animation: fadeIn 0.4s ease;
        }
        .spoiler-content.show {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .svg-wrap {
            background: #0a0a0a;
            border-radius: 12px;
            padding: 4px;
            border: 1px solid #161616;
            overflow: hidden;
        }
        body.light-mode .svg-wrap {
            background: #f0f0f0;
            border-color: #ddd;
        }
        .svg-wrap svg {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 8px;
            background: #0a0a0a;
        }
        body.light-mode .svg-wrap svg {
            background: #f0f0f0;
        }

        /* ===== FOOTER - دقیقاً مثل کد شما ===== */
        .global-footer {
            margin-top: 50px;
            padding-top: 24px;
            border-top: 1px solid #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: #666;
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 0.3px;
            width: 100%;
        }
        body.light-mode .global-footer {
            border-color: #ccc;
            color: #999;
        }
        .global-footer .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px 24px;
        }
        .global-footer .footer-links a {
            color: #888;
            text-decoration: none;
            font-size: 12px;
            transition: color 0.2s ease;
            font-weight: 400;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .global-footer .footer-links a:hover {
            color: #fff;
        }
        .global-footer .footer-links a svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            fill: currentColor;
        }

        .global-footer .footer-copy {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px 16px;
            font-size: 11px;
            color: #555;
            margin-top: 4px;
        }
        body.light-mode .global-footer .footer-copy {
            color: #888;
        }
        .global-footer .footer-copy .brand-highlight {
            color: #ccc;
            font-weight: 600;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.08);
            letter-spacing: 0.5px;
            font-size: 12px;
        }
        body.light-mode .global-footer .footer-copy .brand-highlight {
            color: #444;
        }
        .global-footer .footer-copy .dot-sep {
            color: #333;
            font-size: 6px;
        }
        .global-footer .footer-copy .telegram-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #aaa;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid transparent;
        }
        .global-footer .footer-copy .telegram-link:hover {
            color: #fff;
            border-color: #333;
            background: rgba(255, 255, 255, 0.03);
        }
        body.light-mode .global-footer .footer-copy .telegram-link:hover {
            color: #000;
            border-color: #aaa;
            background: rgba(0, 0, 0, 0.05);
        }
        .global-footer .footer-copy .telegram-link svg {
            width: 16px;
            height: 16px;
            fill: #aaa;
            transition: fill 0.2s ease;
        }
        .global-footer .footer-copy .telegram-link:hover svg {
            fill: #fff;
        }
        body.light-mode .global-footer .footer-copy .telegram-link:hover svg {
            fill: #000;
        }

        .global-footer .footer-powered {
            font-size: 11px;
            color: #555;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }
        .global-footer .footer-powered .powered-highlight {
            color: #ccc;
            font-weight: 600;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.06);
        }
        body.light-mode .global-footer .footer-powered .powered-highlight {
            color: #444;
        }

        @media (max-width: 480px) {
            .glass-main {
                padding: 12px 6px 20px;
            }
            .header {
                padding: 10px 10px;
                margin-bottom: 30px;
                border-radius: 14px;
            }
            .header .brand {
                font-size: 16px;
                letter-spacing: 2px;
            }
            .chart-box.answer-box {
                margin-top: 40px;
            }
            .global-footer .footer-links {
                gap: 10px 14px;
            }
            .global-footer .footer-links a {
                font-size: 10px;
            }
            .global-footer .footer-links a svg {
                width: 15px;
                height: 15px;
            }
            .global-footer .footer-copy {
                font-size: 9px;
                gap: 4px 10px;
                flex-direction: column;
            }
            .global-footer .footer-copy .brand-highlight {
                font-size: 10px;
            }
            .global-footer .footer-copy .telegram-link {
                font-size: 10px;
            }
            .global-footer .footer-copy .telegram-link svg {
                width: 14px;
                height: 14px;
            }
            .global-footer .footer-powered {
                font-size: 9px;
            }
        }
    </style>
</head>
<body>

    <div class="glass-main">

        <div class="top-buttons">
            <button class="theme-toggle-btn" id="themeToggle" aria-label="تغییر تم">
                <svg class="icon-moon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                </svg>
                <svg class="icon-sun" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                    <circle cx="12" cy="12" r="5" />
                    <line x1="12" y1="1" x2="12" y2="3" />
                    <line x1="12" y1="21" x2="12" y2="23" />
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                    <line x1="1" y1="12" x2="3" y2="12" />
                    <line x1="21" y1="12" x2="23" y2="12" />
                </svg>
            </button>
        </div>

        <div class="header">
            <span class="brand">Amitis</span>
        </div>

        <div class="level-display" id="levelDisplay">
            <span class="level-label">Your Level :</span>
            <span class="level-name" id="levelName">Beginner</span>
            <span class="level-progress" id="levelProgress">(0)</span>
        </div>

        <div class="item" id="exercise-container">
            <div class="chart-box">
                <div class="label">
                    <span class="title">● روند رو با ترندلاین مشخص کنید :</span>
                    <span class="badge" id="questionBadge" style="display:none;">---</span>
                </div>
                <div class="toolbar">
                    <button class="trend-btn" data-target="mainSvg">✏️ ترند لاین</button>
                    <button class="clear-btn" data-target="mainSvg">🗑 پاک کردن</button>
                    <button class="redo-btn" data-target="mainSvg">→</button>
                    <button class="undo-btn" data-target="mainSvg">←</button>
                    <button class="new-exercise-btn" onclick="generateNewExercise(true)">تمرین جدید</button>
                    <span class="exercise-counter-inline">
                        <span class="counter-label">تمرین شماره :</span>
                        <span class="counter-number" id="exerciseCounter">1</span>
                    </span>
                    <span class="toolbar-divider">|</span>

            }

        // ===== STORAGE =====
        const STORAGE_KEY = 'amitis_trend_record_single';

        function getBestRecord() {

        }

        function setBestRecord(value) {
            localStorage.setItem(STORAGE_KEY, String(value));
        }

        let exerciseCounter = 1;
        let bestRecord = getBestRecord();

        function updateRecordDisplay() {
            document.getElementById('bestRecordDisplay').textContent = bestRecord;
            const badge = document.getElementById('newRecordBadge');
            if (exerciseCounter - 1 > bestRecord && exerciseCounter > 2) {
                badge.classList.add('show');

                document.getElementById('bestRecordDisplay').textContent = bestRecord;
                updateLevelDisplay(bestRecord);

        document.getElementById('recordClickArea').addEventListener('click', function(e) {
            e.stopPropagation();
            if (confirm('آیا می‌خواهید شمارنده تمرین‌های حل شده را ریست کنید؟')) {
                bestRecord = 0;
                setBestRecord(0);
                document.getElementById('bestRecordDisplay').textContent = '0';
                document.getElementById('newRecordBadge').classList.remove('show');
                exerciseCounter = 1;
                document.getElementById('exerciseCounter').textContent = '1';
                updateLevelDisplay(0);
            }
        });

        // ===== CONSTANTS =====
        const GLOBAL_MIN = 26;
        const GLOBAL_MAX = 86;
        const WAVE_SIZE = 4;
        const TOTAL_WAVES = 8;

        let currentCandles = [];
        let currentWaveRanges = [];
        let currentTrendType = 'up';
        let rangeMin = 0;
        let rangeMax = 0;

        // ===== HELPER FUNCTIONS =====
        function getWickType() {
            const r = Math.random();
            if (r < 0.25) return 0;
            if (r < 0.50) return 1;
            if (r < 0.75) return 2;
            return 3;
        }

        function generateStandardCandle(currentPrice, closePrice, minLimit, maxLimit) {
            const open = Math.round(currentPrice * 100) / 100;
            const close = Math.round(closePrice * 100) / 100;
            const wickType = getWickType();
            let high = Math.max(open, close);
            let low = Math.min(open, close);
            if (wickType === 1 || wickType === 3) {
                high = Math.round((Math.max(open, close) + 1.5 + Math.random() * 2.5) * 100) / 100;
            }
            if (wickType === 2 || wickType === 3) {
                low = Math.round((Math.min(open, close) - 1.5 - Math.random() * 2.5) * 100) / 100;
            }
            high = Math.min(maxLimit, Math.max(minLimit, high));
            low = Math.max(minLimit, Math.min(maxLimit, low));
            return { high, low, open, close };
        }

        function generateRandomCandle(currentPrice, allowSpike = false) {
            let move;
            if (allowSpike && Math.random() < 0.12) {
                move = (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 4);
            } else {
                move = (Math.random() - 0.5) * 6;
            }
            let close = Math.round((currentPrice + move) * 100) / 100;
            close = Math.max(GLOBAL_MIN + 0.5, Math.min(GLOBAL_MAX - 0.5, close));
            return generateStandardCandle(currentPrice, close, GLOBAL_MIN, GLOBAL_MAX);
        }

        function generatePumpCandles(currentPrice, direction) {
            const candles = [];
            const moves = direction === 'up' ? [6, 3, 7, 4] : [-6, -3, -7, -4];
            for (let i = 0; i < 4; i++) {
                let targetPrice = currentPrice + moves[i];
                targetPrice = Math.max(GLOBAL_MIN + 0.5, Math.min(GLOBAL_MAX - 0.5, targetPrice));
                const noise = (Math.random() - 0.5) * 1.5;
                let close = Math.round((targetPrice + noise) * 100) / 100;
                close = Math.max(GLOBAL_MIN + 0.5, Math.min(GLOBAL_MAX - 0.5, close));
                const candle = generateStandardCandle(currentPrice, close, GLOBAL_MIN, GLOBAL_MAX);
                candles.push(candle);
                currentPrice = candle.close;
            }
            return { candles, lastPrice: currentPrice };
        }

        // ===== GENERATE TRENDS =====
        function generateUpwardTrendRangeCandles(startPrice) {
            const candles = [];
            let currentPrice = startPrice;
            const initialHeight = 18 + Math.random() * 8;
            let currentHeight = initialHeight;
            const heightDecay = 0.93 + Math.random() * 0.05;
            const stepPerWave = 1.5 + Math.random() * 1.0;
            const waveRanges = [];
            const startMin = GLOBAL_MIN + 4 + Math.random() * 3;
            let baseMin = Math.round(startMin);

            for (let i = 0; i < TOTAL_WAVES; i++) {
                if (i > 0) {
                    currentHeight = currentHeight * heightDecay;
                    currentHeight = Math.max(8, currentHeight);
                }
                const offset = i * stepPerWave;
                let waveMin = baseMin + offset;
                let waveMax = waveMin + currentHeight;
                if (i > 0) {
                    const prevRange = waveRanges[i - 1];
                    const minRequired = prevRange.min + 1.0;
                    if (waveMin < minRequired) {
                        waveMin = minRequired;
                        waveMax = waveMin + currentHeight;
                    }
                }
                waveMin = Math.max(GLOBAL_MIN + 2, Math.min(GLOBAL_MAX - currentHeight - 3, waveMin));
                waveMax = waveMin + currentHeight;
                if (waveMax > GLOBAL_MAX - 2) {
                    waveMax = GLOBAL_MAX - 2;
                    waveMin = waveMax - currentHeight;
                }
                waveRanges.push({
                    min: Math.round(waveMin * 10) / 10,
                    max: Math.round(waveMax * 10) / 10,
                    height: currentHeight
                });
            }

            const firstWave = waveRanges[0];
            if (currentPrice < firstWave.min) {
                const steps = Math.min(3, Math.ceil((firstWave.min - currentPrice) / 2));
                for (let i = 0; i < steps; i++) {
                    const progress = (i + 1) / (steps + 1);
                    const targetPrice = currentPrice + (firstWave.min - currentPrice) * progress + 0.5;
                    const close = Math.min(targetPrice, firstWave.min + 0.5);
                    const candle = generateStandardCandle(currentPrice, close, GLOBAL_MIN, GLOBAL_MAX);
                    candles.push(candle);
                    currentPrice = candle.close;
                }
            } else if (currentPrice > firstWave.max) {
                const steps = Math.min(3, Math.ceil((currentPrice - firstWave.max) / 2));
                for (let i = 0; i < steps; i++) {
                    const progress = (i + 1) / (steps + 1);
                    const targetPrice = currentPrice - (currentPrice - firstWave.max) * progress - 0.5;
                    const close = Math.max(targetPrice, firstWave.max - 0.5);
                    const candle = generateStandardCandle(currentPrice, close, GLOBAL_MIN, GLOBAL_MAX);
                    candles.push(candle);
                    currentPrice = candle.close;
                }
            }

            const resultWaveRanges = [];
            waveRanges.forEach((waveRange, waveIndex) => {
                const waveMin = waveRange.min;
                const waveMax = waveRange.max;
                const isDown = waveIndex % 2 === 0;
                const startPrice = isDown ? waveMax : waveMin;
                const endPrice = isDown ? waveMin : waveMax;
                const reverseCount = 2;
                const reversePos = [];
                while (reversePos.length < reverseCount) {
                    const pos = Math.floor(Math.random() * WAVE_SIZE);
                    if (!reversePos.includes(pos)) reversePos.push(pos);
                }
                reversePos.sort();
                const waveStartIndex = candles.length;
                for (let i = 0; i < WAVE_SIZE; i++) {
                    const progress = (i + 1) / WAVE_SIZE;
                    let targetPrice = startPrice + (endPrice - startPrice) * progress;
                    const isReverse = reversePos.includes(i);
                    let close;
                    if (isReverse) {
                        const offset = (Math.random() * 1.5 + 0.5) * (isDown ? 1 : -1);
                        close = Math.round((targetPrice + offset) * 100) / 100;
                    } else {
                        const noise = (Math.random() - 0.5) * 0.8;
                        close = Math.round((targetPrice + noise) * 100) / 100;
                    }
                    const margin = 0.3;
                    close = Math.max(waveMin + margin, Math.min(waveMax - margin, close));
                    const candle = generateStandardCandle(currentPrice, close, waveMin - 0.5, waveMax + 0.5);
                    candles.push(candle);
                    currentPrice = candle.close;
                }
                let waveLow = Infinity;
                let waveHigh = -Infinity;
                for (let i = waveStartIndex; i < candles.length; i++) {
                    if (candles[i].low < waveLow) waveLow = candles[i].low;
                    if (candles[i].high > waveHigh) waveHigh = candles[i].high;
                }
                resultWaveRanges.push({
                    startIndex: waveStartIndex,
                    endIndex: candles.length - 1,
                    min: waveLow,
                    max: waveHigh,
                    isDown: isDown
                });
            });
            return { candles, lastPrice: currentPrice, waveRanges: resultWaveRanges };
        }

        function generateDownwardTrendRangeCandles(startPrice) {
            const candles = [];
            let currentPrice = startPrice;
            const initialHeight = 18 + Math.random() * 8;
            let currentHeight = initialHeight;
            const heightDecay = 0.93 + Math.random() * 0.05;
            const stepPerWave = 1.5 + Math.random() * 1.0;
            const waveRanges = [];
            const startMax = GLOBAL_MAX - 4 - Math.random() * 3;
            let baseMax = Math.round(startMax);

            for (let i = 0; i < TOTAL_WAVES; i++) {
                if (i > 0) {
                    currentHeight = currentHeight * heightDecay;
                    currentHeight = Math.max(8, currentHeight);
                }
                const offset = i * stepPerWave;
                let waveMax = baseMax - offset;
                let waveMin = waveMax - currentHeight;
                if (i > 0) {
                    const prevRange = waveRanges[i - 1];
                    const maxRequired = prevRange.max - 1.0;
                    if (waveMax > maxRequired) {
                        waveMax = maxRequired;
                        waveMin = waveMax - currentHeight;
                    }
                }
                waveMax = Math.min(GLOBAL_MAX - 2, Math.max(GLOBAL_MIN + currentHeight + 3, waveMax));
                waveMin = waveMax - currentHeight;
                if (waveMin < GLOBAL_MIN + 2) {
                    waveMin = GLOBAL_MIN + 2;
                    waveMax = waveMin + currentHeight;
                }
                waveRanges.push({
                    min: Math.round(waveMin * 10) / 10,
                    max: Math.round(waveMax * 10) / 10,
                    height: currentHeight
                });
            }

            const firstWave = waveRanges[0];
            if (currentPrice > firstWave.max) {
                const steps = Math.min(3, Math.ceil((currentPrice - firstWave.max) / 2));
                for (let i = 0; i < steps; i++) {
                    const progress = (i + 1) / (steps + 1);
                    const targetPrice = currentPrice - (currentPrice - firstWave.max) * progress - 0.5;
                    const close = Math.max(targetPrice, firstWave.max - 0.5);
                    const candle = generateStandardCandle(currentPrice, close, GLOBAL_MIN, GLOBAL_MAX);
                    candles.push(candle);
                    currentPrice = candle.close;
                }
            } else if (currentPrice < firstWave.min) {
                const steps = Math.min(3, Math.ceil((firstWave.min - currentPrice) / 2));
                for (let i = 0; i < steps; i++) {
                    const progress = (i + 1) / (steps + 1);
                    const targetPrice = currentPrice + (firstWave.min - currentPrice) * progress + 0.5;
                    const close = Math.min(targetPrice, firstWave.min + 0.5);
                    const candle = generateStandardCandle(currentPrice, close, GLOBAL_MIN, GLOBAL_MAX);
                    candles.push(candle);
                    currentPrice = candle.close;
                }
            }

            const resultWaveRanges = [];
            waveRanges.forEach((waveRange, waveIndex) => {
                const waveMin = waveRange.min;
                const waveMax = waveRange.max;
                const isUp = waveIndex % 2 === 0;
                const startPrice = isUp ? waveMin : waveMax;
                const endPrice = isUp ? waveMax : waveMin;
                const reverseCount = 2;
                const reversePos = [];
                while (reversePos.length < reverseCount) {
                    const pos = Math.floor(Math.random() * WAVE_SIZE);
                    if (!reversePos.includes(pos)) reversePos.push(pos);
                }
                reversePos.sort();
                const waveStartIndex = candles.length;
                for (let i = 0; i < WAVE_SIZE; i++) {
                    const progress = (i + 1) / WAVE_SIZE;
                    let targetPrice = startPrice + (endPrice - startPrice) * progress;
                    const isReverse = reversePos.includes(i);
                    let close;
                    if (isReverse) {
                        const offset = (Math.random() * 1.5 + 0.5) * (isUp ? -1 : 1);
                        close = Math.round((targetPrice + offset) * 100) / 100;
                    } else {
                        const noise = (Math.random() - 0.5) * 0.8;
                        close = Math.round((targetPrice + noise) * 100) / 100;
                    }
                    close = Math.max(waveMin + 0.5, Math.min(waveMax - 0.5, close));
                    const candle = generateStandardCandle(currentPrice, close, waveMin + 0.3, waveMax - 0.3);
                    candles.push(candle);
                    currentPrice = candle.close;
                }
                let waveLow = Infinity;
                let waveHigh = -Infinity;
                for (let i = waveStartIndex; i < candles.length; i++) {
                    if (candles[i].low < waveLow) waveLow = candles[i].low;
                    if (candles[i].high > waveHigh) waveHigh = candles[i].high;
                }
                resultWaveRanges.push({
                    startIndex: waveStartIndex,
                    endIndex: candles.length - 1,
                    min: waveLow,
                    max: waveHigh,
                    isDown: !isUp
                });
            });
            return { candles, lastPrice: currentPrice, waveRanges: resultWaveRanges };
        }

        function generateRangeCandles(startPrice) {
            const candles = [];
            let currentPrice = startPrice;
            const rangeHeight = 18 + Math.random() * 12;
            const rangeMinPrice = GLOBAL_MIN + 8 + Math.random() * (GLOBAL_MAX - GLOBAL_MIN - rangeHeight - 16);
            const rangeMaxPrice = rangeMinPrice + rangeHeight;
            rangeMin = Math.round(rangeMinPrice);
            rangeMax = Math.round(rangeMaxPrice);

            if (currentPrice < rangeMin) {
                const steps = Math.min(3, Math.ceil((rangeMin - currentPrice) / 2));
                for (let i = 0; i < steps; i++) {
                    const progress = (i + 1) / (steps + 1);
                    const targetPrice = currentPrice + (rangeMin - currentPrice) * progress + 0.5;
                    const close = Math.min(targetPrice, rangeMin + 0.5);
                    const candle = generateStandardCandle(currentPrice, close, GLOBAL_MIN, GLOBAL_MAX);
                    candles.push(candle);
                    currentPrice = candle.close;
                }
            } else if (currentPrice > rangeMax) {
                const steps = Math.min(3, Math.ceil((currentPrice - rangeMax) / 2));
                for (let i = 0; i < steps; i++) {
                    const progress = (i + 1) / (steps + 1);
                    const targetPrice = currentPrice - (currentPrice - rangeMax) * progress - 0.5;
                    const close = Math.max(targetPrice, rangeMax - 0.5);
                    const candle = generateStandardCandle(currentPrice, close, GLOBAL_MIN, GLOBAL_MAX);
                    candles.push(candle);
                    currentPrice = candle.close;
                }
            }

            const waveRanges = [];
            const waves = 8;
            const waveSize = 6;
            for (let w = 0; w < waves; w++) {
                const isDown = w % 2 === 0;
                const startPrice = isDown ? rangeMax : rangeMin;
                const endPrice = isDown ? rangeMin : rangeMax;
                const reverseCount = Math.random() < 0.5 ? 2 : 3;
                const reversePos = [];
                while (reversePos.length < reverseCount) {
                    const pos = Math.floor(Math.random() * waveSize);
                    if (!reversePos.includes(pos)) reversePos.push(pos);
                }
                reversePos.sort();
                const waveStartIndex = candles.length;
                for (let i = 0; i < waveSize; i++) {
                    const progress = (i + 1) / waveSize;
                    let targetPrice = startPrice + (endPrice - startPrice) * progress;
                    const isReverse = reversePos.includes(i);
                    let close;
                    if (isReverse) {
                        const offset = (Math.random() * 2 + 1) * (isDown ? 1 : -1);
                        close = Math.round((targetPrice + offset) * 100) / 100;
                    } else {
                        const noise = (Math.random() - 0.5) * 0.8;
                        close = Math.round((targetPrice + noise) * 100) / 100;
                    }
                    close = Math.max(rangeMin + 0.8, Math.min(rangeMax - 0.8, close));
                    const candle = generateStandardCandle(currentPrice, close, rangeMin + 0.5, rangeMax - 0.5);
                    candles.push(candle);
                    currentPrice = candle.close;
                }
                let waveLow = Infinity;
                let waveHigh = -Infinity;
                for (let i = waveStartIndex; i < candles.length; i++) {
                    if (candles[i].low < waveLow) waveLow = candles[i].low;
                    if (candles[i].high > waveHigh) waveHigh = candles[i].high;
                }
                waveRanges.push({
                    startIndex: waveStartIndex,
                    endIndex: candles.length - 1,
                    min: waveLow,
                    max: waveHigh,
                    isDown: isDown
                });
            }
            return { candles, lastPrice: currentPrice, waveRanges };
        }

        // ===== GENERATE EXERCISE =====
        function shuffleSections() {
            const sections = [
                { type: 'random', count: 37 },
                { type: 'random', count: 33 },
                { type: 'pump', count: 4 },
                { type: 'range', count: 32 }
            ];
            for (let i = sections.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [sections[i], sections[j]] = [sections[j], sections[i]];
            }
            return sections;
        }

        function generateAllCandles() {
            const trendTypes = ['up', 'down', 'range'];
            currentTrendType = trendTypes[Math.floor(Math.random() * trendTypes.length)];
            const shuffledSections = shuffleSections();
            const allCandles = [];
            let currentPrice = 40 + Math.random() * 30;
            const pumpDirection = Math.random() < 0.5 ? 'up' : 'down';
            let allWaveRanges = [];

            shuffledSections.forEach(section => {
                if (section.type === 'random') {
                    for (let i = 0; i < section.count; i++) {
                        const candle = generateRandomCandle(currentPrice, true);
                        allCandles.push(candle);
                        currentPrice = candle.close;
                    }
                } else if (section.type === 'pump') {
                    const pumpResult = generatePumpCandles(currentPrice, pumpDirection);
                    allCandles.push(...pumpResult.candles);
                    currentPrice = pumpResult.lastPrice;
                } else if (section.type === 'range') {
                    let waveResult;
                    if (currentTrendType === 'up') {
                        waveResult = generateUpwardTrendRangeCandles(currentPrice);
                    } else if (currentTrendType === 'down') {
                        waveResult = generateDownwardTrendRangeCandles(currentPrice);
                    } else {
                        waveResult = generateRangeCandles(currentPrice);
                    }
                    const offset = allCandles.length;
                    allCandles.push(...waveResult.candles);
                    waveResult.waveRanges.forEach(wr => {
                        allWaveRanges.push({
                            startIndex: wr.startIndex + offset,
                            endIndex: wr.endIndex + offset,
                            min: wr.min,
                            max: wr.max,
                            isDown: wr.isDown
                        });
                    });
                    currentPrice = waveResult.lastPrice;
                }
            });
            currentWaveRanges = allWaveRanges;
            return allCandles;
        }

        // ===== RENDER CANDLES =====
        function renderCandles(candles, svgId, showAnswerLine = false) {
            const svg = document.getElementById(svgId);
            const toRemove = [];
            for (let i = 0; i < svg.children.length; i++) {
                const child = svg.children[i];
                const isGrid = child.tagName === 'line' && child.getAttribute('stroke') === '#151515';
                const isLabel = child.tagName === 'text' && !child.id;
                const isBg = child.tagName === 'rect' && child.getAttribute('fill') === '#0a0a0a';
                const isAnswerLine = child.tagName === 'line' && child.getAttribute('stroke') === '#ff9b00' &&
                    (child.getAttribute('stroke-width') === '3' || child.getAttribute('stroke-width') === '2.5');
                if (!isGrid && !isLabel && !isBg && !isAnswerLine) {
                    toRemove.push(child);
                }
            }
            if (showAnswerLine) {
                const oldLines = svg.querySelectorAll('line');
                oldLines.forEach(line => {
                    if (line.getAttribute('stroke') === '#ff9b00' &&
                        (line.getAttribute('stroke-width') === '3' || line.getAttribute('stroke-width') === '2.5')) {
                        line.remove();
                    }
                });
            }
            toRemove.forEach(el => el.remove());

            const ns = 'http://www.w3.org/2000/svg';
            const padding = 30;
            const chartWidth = 950;
            const chartHeight = 250;
            const baseY = 280;
            const candleWidth = chartWidth / candles.length;
            const bodyWidth = candleWidth * 0.6;

            candles.forEach((candle, index) => {
                const x = padding + (index * candleWidth) + (candleWidth - bodyWidth) / 2;
                const high = Math.min(GLOBAL_MAX, Math.max(GLOBAL_MIN, candle.high));
                const low = Math.min(GLOBAL_MAX, Math.max(GLOBAL_MIN, candle.low));
                const open = Math.min(high, Math.max(low, candle.open));
                const close = Math.min(high, Math.max(low, candle.close));
                const yHigh = baseY - ((high - GLOBAL_MIN) / (GLOBAL_MAX - GLOBAL_MIN)) * chartHeight;
                const yLow = baseY - ((low - GLOBAL_MIN) / (GLOBAL_MAX - GLOBAL_MIN)) * chartHeight;
                const yOpen = baseY - ((open - GLOBAL_MIN) / (GLOBAL_MAX - GLOBAL_MIN)) * chartHeight;
                const yClose = baseY - ((close - GLOBAL_MIN) / (GLOBAL_MAX - GLOBAL_MIN)) * chartHeight;
                const isUp = close >= open;
                const color = isUp ? '#ffffff' : '#890913';
                const bodyY = Math.min(yOpen, yClose);
                const bodyH = Math.max(1.5, Math.abs(yOpen - yClose));
                const rect = document.createElementNS(ns, 'rect');
                rect.setAttribute('x', x);
                rect.setAttribute('y', bodyY);
                rect.setAttribute('width', bodyWidth);
                rect.setAttribute('height', bodyH);
                rect.setAttribute('fill', color);
                rect.setAttribute('rx', '0');
                rect.setAttribute('opacity', '0.95');
                svg.appendChild(rect);
                if (yHigh < bodyY) {
                    const lineTop = document.createElementNS(ns, 'line');
                    lineTop.setAttribute('x1', x + bodyWidth / 2);
                    lineTop.setAttribute('y1', yHigh);
                    lineTop.setAttribute('x2', x + bodyWidth / 2);
                    lineTop.setAttribute('y2', bodyY);
                    lineTop.setAttribute('stroke', color);
                    lineTop.setAttribute('stroke-width', Math.max(1, bodyWidth / 6));
                    lineTop.setAttribute('opacity', '0.9');
                    svg.appendChild(lineTop);
                }
                if (yLow > bodyY + bodyH) {
                    const lineBottom = document.createElementNS(ns, 'line');
                    lineBottom.setAttribute('x1', x + bodyWidth / 2);
                    lineBottom.setAttribute('y1', bodyY + bodyH);
                    lineBottom.setAttribute('x2', x + bodyWidth / 2);
                    lineBottom.setAttribute('y2', yLow);
                    lineBottom.setAttribute('stroke', color);
                    lineBottom.setAttribute('stroke-width', Math.max(1, bodyWidth / 6));
                    lineBottom.setAttribute('opacity', '0.9');
                    svg.appendChild(lineBottom);
                }
            });

            if (showAnswerLine && candles.length > 0 && currentWaveRanges.length > 0) {
                const lowPoints = [];
                const highPoints = [];
                currentWaveRanges.forEach((wave) => {
                    let waveLow = Infinity;
                    let waveHigh = -Infinity;
                    let lowIndex = wave.startIndex;
                    let highIndex = wave.startIndex;
                    for (let i = wave.startIndex; i <= wave.endIndex && i < candles.length; i++) {
                        if (candles[i].low < waveLow) {
                            waveLow = candles[i].low;
                            lowIndex = i;
                        }
                        if (candles[i].high > waveHigh) {
                            waveHigh = candles[i].high;
                            highIndex = i;
                        }
                    }
                    lowPoints.push({ index: lowIndex, price: waveLow });
                    highPoints.push({ index: highIndex, price: waveHigh });
                });

                if (lowPoints.length >= 2 && highPoints.length >= 2) {
                    const firstLow = lowPoints[0];
                    const lastLow = lowPoints[lowPoints.length - 1];
                    const firstHigh = highPoints[0];
                    const lastHigh = highPoints[highPoints.length - 1];
                    const firstX = padding + (firstLow.index * candleWidth) + (candleWidth - bodyWidth) / 2 + bodyWidth / 2;
                    const lastX = padding + (lastLow.index * candleWidth) + (candleWidth - bodyWidth) / 2 + bodyWidth / 2;
                    const yFirstLow = baseY - ((firstLow.price - GLOBAL_MIN) / (GLOBAL_MAX - GLOBAL_MIN)) * chartHeight;
                    const yLastLow = baseY - ((lastLow.price - GLOBAL_MIN) / (GLOBAL_MAX - GLOBAL_MIN)) * chartHeight;
                    const yFirstHigh = baseY - ((firstHigh.price - GLOBAL_MIN) / (GLOBAL_MAX - GLOBAL_MIN)) * chartHeight;
                    const yLastHigh = baseY - ((lastHigh.price - GLOBAL_MIN) / (GLOBAL_MAX - GLOBAL_MIN)) * chartHeight;
                    const lineBottom = document.createElementNS(ns, 'line');
                    lineBottom.setAttribute('x1', firstX);
                    lineBottom.setAttribute('y1', yFirstLow);
                    lineBottom.setAttribute('x2', lastX);
                    lineBottom.setAttribute('y2', yLastLow);
                    lineBottom.setAttribute('stroke', '#ff9b00');
                    lineBottom.setAttribute('stroke-width', '2.5');
                    lineBottom.setAttribute('opacity', '0.8');
                    svg.appendChild(lineBottom);
                    const lineTop = document.createElementNS(ns, 'line');
                    lineTop.setAttribute('x1', firstX);
                    lineTop.setAttribute('y1', yFirstHigh);
                    lineTop.setAttribute('x2', lastX);
                    lineTop.setAttribute('y2', yLastHigh);
                    lineTop.setAttribute('stroke', '#ff9b00');
                    lineTop.setAttribute('stroke-width', '2.5');
                    lineTop.setAttribute('opacity', '0.8');
                    svg.appendChild(lineTop);
                }
            }
        }

        // ===== MAIN FUNCTIONS =====
        function generateNewExercise(incrementCounter = true) {
            const candles = generateAllCandles();
            currentCandles = candles;
            const mainSvg = document.getElementById('mainSvg');
            const linesToRemove = [];
            for (let i = 0; i < mainSvg.children.length; i++) {

                    linesToRemove.push(child);

            if (history['mainSvg']) {
                history['mainSvg'] = { undo: [], redo: [] };

            renderCandles(candles, 'answerSvg', true);
            const questionBadge = document.getElementById('questionBadge');

        function toggleSpoiler(btn) {

        // ===== TREND LINE TOOLS =====
        const history = {};

        function getHistory(svgId) {
            if (!history[svgId]) {
                history[svgId] = { undo: [], redo: [] };
            }
            return history[svgId];
        }

        function saveLine(svgId, line) {
            const h = getHistory(svgId);
            h.undo.push(line);
            h.redo = [];
        }

        function isMobile() {
            return /Mobi|Android|iPhone|iPad|iPod|BlackBerry|Opera Mini|IEMobile/i.test(navigator.userAgent);
        }

        document.querySelectorAll('.trend-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const targetId = this.dataset.target;
                const svg = document.getElementById(targetId);

                    svg.style.cursor = 'default';

                    svg.dataset.startY = '';
                    const tempLine = svg.querySelector('.temp-line');
                    if (tempLine) tempLine.remove();
                    const crosshair = svg.querySelector('.trend-crosshair');
                    if (crosshair) crosshair.remove();
                    const startPoint = svg.querySelector('.start-point');
                    if (startPoint) startPoint.remove();

                }
                document.querySelectorAll('.trend-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('svg').forEach(s => {
                    s.style.cursor = 'default';

                    const tl = s.querySelector('.temp-line');
                    if (tl) tl.remove();
                    const ch = s.querySelector('.trend-crosshair');
                    if (ch) ch.remove();
                    const sp = s.querySelector('.start-point');
                    if (sp) sp.remove();
                });
                this.classList.add('active');
                svg.style.cursor = 'crosshair';
                svg.dataset.drawing = 'true';
                svg.dataset.step = '0';
                svg.dataset.startX = '';
                svg.dataset.startY = '';
                const ns = 'http://www.w3.org/2000/svg';
                const crosshair = document.createElementNS(ns, 'g');
                crosshair.classList.add('trend-crosshair');
                crosshair.style.display = 'none';
                const vLine = document.createElementNS(ns, 'line');
                vLine.setAttribute('x1', '0');
                vLine.setAttribute('y1', '0');
                vLine.setAttribute('x2', '0');
                vLine.setAttribute('y2', '200');
                vLine.setAttribute('stroke', 'rgba(255,255,255,0.15)');
                vLine.setAttribute('stroke-width', '0.5');
                vLine.setAttribute('stroke-dasharray', '3,3');
                const hLine = document.createElementNS(ns, 'line');
                hLine.setAttribute('x1', '0');
                hLine.setAttribute('y1', '0');
                hLine.setAttribute('x2', '400');
                hLine.setAttribute('y2', '0');
                hLine.setAttribute('stroke', 'rgba(255,255,255,0.15)');
                hLine.setAttribute('stroke-width', '0.5');
                hLine.setAttribute('stroke-dasharray', '3,3');
                const circle = document.createElementNS(ns, 'circle');
                circle.setAttribute('cx', '0');
                circle.setAttribute('cy', '0');
                circle.setAttribute('r', '5');
                circle.setAttribute('fill', 'none');
                circle.setAttribute('stroke', 'rgba(255,255,255,0.3)');
                circle.setAttribute('stroke-width', '1.2');
                const dot = document.createElementNS(ns, 'circle');
                dot.setAttribute('cx', '0');
                dot.setAttribute('cy', '0');
                dot.setAttribute('r', '1.5');
                dot.setAttribute('fill', 'rgba(255,255,255,0.2)');
                crosshair.appendChild(vLine);
                crosshair.appendChild(hLine);
                crosshair.appendChild(circle);
                crosshair.appendChild(dot);
                svg.appendChild(crosshair);
            });
        });

        document.querySelectorAll('.svg-wrap svg').forEach(svg => {
            let tempLine = null;
            let startPointCircle = null;

            function getCoords(e) {
                const rect = svg.getBoundingClientRect();
                const viewBox = svg.viewBox.baseVal;
                const scaleX = viewBox.width / rect.width;
                const scaleY = viewBox.height / rect.height;
                let clientX, clientY;
                if (e.touches) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                const x = Math.max(0, Math.min(viewBox.width, (clientX - rect.left) * scaleX));
                const y = Math.max(0, Math.min(viewBox.height, (clientY - rect.top) * scaleY));
                return { x, y };
            }

            function updateCrosshair(x, y) {
                const crosshair = svg.querySelector('.trend-crosshair');
                if (!crosshair) return;
                crosshair.style.display = 'block';
                const vLine = crosshair.children[0];
                const hLine = crosshair.children[1];
                const circle = crosshair.children[2];
                const dot = crosshair.children[3];
                vLine.setAttribute('x1', x);
                vLine.setAttribute('x2', x);
                hLine.setAttribute('y1', y);
                hLine.setAttribute('y2', y);
                circle.setAttribute('cx', x);
                circle.setAttribute('cy', y);
                dot.setAttribute('cx', x);
                dot.setAttribute('cy', y);
            }

            function hideCrosshair() {
                const crosshair = svg.querySelector('.trend-crosshair');
                if (crosshair) crosshair.style.display = 'none';
            }

            function createTempLine(x1, y1, x2, y2) {
                const ns = 'http://www.w3.org/2000/svg';
                if (tempLine) {
                    tempLine.setAttribute('x1', x1);
                    tempLine.setAttribute('y1', y1);
                    tempLine.setAttribute('x2', x2);
                    tempLine.setAttribute('y2', y2);
                    return;
                }
                tempLine = document.createElementNS(ns, 'line');
                tempLine.setAttribute('x1', x1);
                tempLine.setAttribute('y1', y1);
                tempLine.setAttribute('x2', x2);
                tempLine.setAttribute('y2', y2);
                tempLine.setAttribute('stroke', '#ff9b00');
                tempLine.setAttribute('stroke-width', '3');
                tempLine.setAttribute('stroke-dasharray', '6,4');
                tempLine.setAttribute('opacity', '0.7');
                tempLine.classList.add('temp-line');
                svg.appendChild(tempLine);
            }

            function removeTempLine() {
                if (tempLine) { tempLine.remove();
                    tempLine = null; }
            }

            function createStartPoint(x, y) {
                const ns = 'http://www.w3.org/2000/svg';
                if (startPointCircle) { startPointCircle.remove();
                    startPointCircle = null; }
                startPointCircle = document.createElementNS(ns, 'circle');
                startPointCircle.setAttribute('cx', x);
                startPointCircle.setAttribute('cy', y);
                startPointCircle.setAttribute('r', '5');
                startPointCircle.setAttribute('fill', 'none');
                startPointCircle.setAttribute('stroke', '#ff9b00');
                startPointCircle.setAttribute('stroke-width', '2');
                startPointCircle.classList.add('start-point');
                svg.appendChild(startPointCircle);
            }

            function removeStartPoint() {
                if (startPointCircle) { startPointCircle.remove();
                    startPointCircle = null; }
            }

            svg.addEventListener('mousedown', function(e) {
                if (svg.dataset.drawing !== 'true') return;
                e.preventDefault();
                const { x, y } = getCoords(e);
                const step = parseInt(svg.dataset.step) || 0;
                const mobile = isMobile();
                if (!mobile) {
                    if (step === 0) {
                        svg.dataset.startX = x;
                        svg.dataset.startY = y;
                        svg.dataset.step = '1';
                        createStartPoint(x, y);
                        createTempLine(x, y, x, y);
                        updateCrosshair(x, y);
                    } else if (step === 1) {
                        const sx = parseFloat(svg.dataset.startX);
                        const sy = parseFloat(svg.dataset.startY);
                        if (sx && sy) {
                            removeTempLine();
                            removeStartPoint();
                            hideCrosshair();
                            const ns = 'http://www.w3.org/2000/svg';
                            const line = document.createElementNS(ns, 'line');
                            line.setAttribute('x1', sx);
                            line.setAttribute('y1', sy);
                            line.setAttribute('x2', x);
                            line.setAttribute('y2', y);
                            line.setAttribute('stroke', '#ff9b00');
                            line.setAttribute('stroke-width', '3');
                            line.setAttribute('opacity', '0.9');
                            svg.appendChild(line);
                            saveLine(svg.id, line);
                            svg.dataset.step = '0';
                            svg.dataset.startX = '';
                            svg.dataset.startY = '';
                        }
                    }
                    return;
                }
                if (mobile) {
                    if (step === 0) {
                        updateCrosshair(x, y);
                        svg.dataset.step = '1';
                    } else if (step === 1) {
                        svg.dataset.startX = x;
                        svg.dataset.startY = y;
                        svg.dataset.step = '2';
                        createStartPoint(x, y);
                        createTempLine(x, y, x, y);
                        updateCrosshair(x, y);
                    } else if (step === 2) {
                        const sx = parseFloat(svg.dataset.startX);
                        const sy = parseFloat(svg.dataset.startY);
                        if (sx && sy) {
                            removeTempLine();
                            removeStartPoint();
                            hideCrosshair();
                            const ns = 'http://www.w3.org/2000/svg';
                            const line = document.createElementNS(ns, 'line');
                            line.setAttribute('x1', sx);
                            line.setAttribute('y1', sy);
                            line.setAttribute('x2', x);
                            line.setAttribute('y2', y);
                            line.setAttribute('stroke', '#ff9b00');
                            line.setAttribute('stroke-width', '3');
                            line.setAttribute('opacity', '0.9');
                            svg.appendChild(line);
                            saveLine(svg.id, line);
                            svg.dataset.step = '0';
                            svg.dataset.startX = '';
                            svg.dataset.startY = '';
                        }
                    }
                }
            });

            svg.addEventListener('mousemove', function(e) {
                if (svg.dataset.drawing !== 'true') return;
                const { x, y } = getCoords(e);
                const step = parseInt(svg.dataset.step) || 0;
                const mobile = isMobile();
                updateCrosshair(x, y);
                if (!mobile && step === 1) {
                    const sx = parseFloat(svg.dataset.startX);
                    const sy = parseFloat(svg.dataset.startY);
                    if (sx && sy) createTempLine(sx, sy, x, y);
                }
                if (mobile && step === 2) {
                    const sx = parseFloat(svg.dataset.startX);
                    const sy = parseFloat(svg.dataset.startY);
                    if (sx && sy) createTempLine(sx, sy, x, y);
                }
            });

            svg.addEventListener('touchstart', function(e) {
                if (svg.dataset.drawing !== 'true') return;
                e.preventDefault();
                const { x, y } = getCoords(e);
                const step = parseInt(svg.dataset.step) || 0;
                const mobile = isMobile();
                if (!mobile) {
                    if (step === 0) {
                        svg.dataset.startX = x;
                        svg.dataset.startY = y;
                        svg.dataset.step = '1';
                        createStartPoint(x, y);
                        createTempLine(x, y, x, y);
                        updateCrosshair(x, y);
                    } else if (step === 1) {
                        const sx = parseFloat(svg.dataset.startX);
                        const sy = parseFloat(svg.dataset.startY);
                        if (sx && sy) {
                            removeTempLine();
                            removeStartPoint();
                            hideCrosshair();
                            const ns = 'http://www.w3.org/2000/svg';
                            const line = document.createElementNS(ns, 'line');
                            line.setAttribute('x1', sx);
                            line.setAttribute('y1', sy);
                            line.setAttribute('x2', x);
                            line.setAttribute('y2', y);
                            line.setAttribute('stroke', '#ff9b00');
                            line.setAttribute('stroke-width', '3');
                            line.setAttribute('opacity', '0.9');
                            svg.appendChild(line);
                            saveLine(svg.id, line);
                            svg.dataset.step = '0';
                            svg.dataset.startX = '';
                            svg.dataset.startY = '';
                        }
                    }
                    return;
                }
                if (mobile) {
                    if (step === 0) {
                        updateCrosshair(x, y);
                        svg.dataset.step = '1';
                    } else if (step === 1) {
                        svg.dataset.startX = x;
                        svg.dataset.startY = y;
                        svg.dataset.step = '2';
                        createStartPoint(x, y);
                        createTempLine(x, y, x, y);
                        updateCrosshair(x, y);
                    } else if (step === 2) {
                        const sx = parseFloat(svg.dataset.startX);
                        const sy = parseFloat(svg.dataset.startY);
                        if (sx && sy) {
                            removeTempLine();
                            removeStartPoint();
                            hideCrosshair();
                            const ns = 'http://www.w3.org/2000/svg';
                            const line = document.createElementNS(ns, 'line');
                            line.setAttribute('x1', sx);
                            line.setAttribute('y1', sy);
                            line.setAttribute('x2', x);
                            line.setAttribute('y2', y);
                            line.setAttribute('stroke', '#ff9b00');
                            line.setAttribute('stroke-width', '3');
                            line.setAttribute('opacity', '0.9');
                            svg.appendChild(line);
                            saveLine(svg.id, line);
                            svg.dataset.step = '0';
                            svg.dataset.startX = '';
                            svg.dataset.startY = '';
                        }
                    }
                }
            }, { passive: false });

            svg.addEventListener('touchmove', function(e) {
                if (svg.dataset.drawing !== 'true') return;
                e.preventDefault();
                const { x, y } = getCoords(e);
                const step = parseInt(svg.dataset.step) || 0;
                const mobile = isMobile();
                updateCrosshair(x, y);
                if (!mobile && step === 1) {
                    const sx = parseFloat(svg.dataset.startX);
                    const sy = parseFloat(svg.dataset.startY);
                    if (sx && sy) createTempLine(sx, sy, x, y);
                }
                if (mobile && step === 2) {
                    const sx = parseFloat(svg.dataset.startX);
                    const sy = parseFloat(svg.dataset.startY);
                    if (sx && sy) createTempLine(sx, sy, x, y);
                }
            }, { passive: false });
        });

        document.querySelectorAll('.undo-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const targetId = this.dataset.target;
                const svg = document.getElementById(targetId);
                if (!svg) return;
                const h = getHistory(targetId);
                if (h.undo.length === 0) return;
                const lastLine = h.undo.pop();
                const lines = svg.querySelectorAll('line');
                let found = null;
                for (const line of lines) {
                    if (line === lastLine) { found = line; break; }
                    if (line.getAttribute('x1') === lastLine.getAttribute('x1') &&
                        line.getAttribute('y1') === lastLine.getAttribute('y1') &&
                        line.getAttribute('x2') === lastLine.getAttribute('x2') &&
                        line.getAttribute('y2') === lastLine.getAttribute('y2') &&
                        line.getAttribute('stroke') === lastLine.getAttribute('stroke')) { found = line; break; }
                }
                if (found) { const clone = found.cloneNode(true);
                    h.redo.push(clone);
                    found.remove(); }
                if (svg.dataset.drawing === 'true') {
                    svg.dataset.step = '0';
                    svg.dataset.startX = '';
                    svg.dataset.startY = '';
                    const tl = svg.querySelector('.temp-line');
                    if (tl) tl.remove();
                    const sp = svg.querySelector('.start-point');
                    if (sp) sp.remove();
                    const ch = svg.querySelector('.trend-crosshair');
                    if (ch) ch.style.display = 'none';
                }
            });
        });

        document.querySelectorAll('.redo-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const targetId = this.dataset.target;
                const svg = document.getElementById(targetId);
                if (!svg) return;
                const h = getHistory(targetId);
                if (h.redo.length === 0) return;
                const line = h.redo.pop();
                svg.appendChild(line);
                h.undo.push(line);
            });
        });

        document.querySelectorAll('.clear-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const targetId = this.dataset.target;
                const svg = document.getElementById(targetId);
                if (!svg) return;
                const h = getHistory(targetId);
                const lines = svg.querySelectorAll('line:not(.temp-line)');
                const userLines = [];
                lines.forEach(line => {
                    if (!line.id && !line.classList.contains('grid-line') && line.getAttribute('stroke') ===
                        '#ff9b00') {
                        userLines.push(line);
                    }
                });
                userLines.forEach(line => { h.undo.push(line); });
                userLines.forEach(line => line.remove());
                h.redo = [];
                if (svg.dataset.drawing === 'true') {
                    svg.dataset.step = '0';
                    svg.dataset.startX = '';
                    svg.dataset.startY = '';
                    const tl = svg.querySelector('.temp-line');
                    if (tl) tl.remove();
                    const sp = svg.querySelector('.start-point');
                    if (sp) sp.remove();
                    const ch = svg.querySelector('.trend-crosshair');
                    if (ch) ch.style.display = 'none';
                }
                const trendBtn = document.querySelector(`.trend-btn[data-target="${targetId}"]`);
                if (trendBtn) {
                    trendBtn.classList.remove('active');
                    svg.style.cursor = 'default';
                    svg.dataset.drawing = 'false';
                }
            });
        });

        // ================================================================
        // INITIALIZATION
        // ================================================================

        window.addEventListener('load', function() {
            exerciseCounter = 1;
            document.getElementById('exerciseCounter').textContent = exerciseCounter;
            bestRecord = getBestRecord();
            document.getElementById('bestRecordDisplay').textContent = bestRecord;
            document.getElementById('newRecordBadge').classList.remove('show');
            updateLevelDisplay(bestRecord);
            generateNewExercise(false);
        });

        console.log('⚡ Amitis v86 - بدون نظر سنجی + فوتر کامل');
        console.log('✅ دکمه بازخورد حذف شد');
        console.log('✅ فوتر با آیتم‌های کامل (GitHub, IPLocation, CoinMarketCap, TradingView)');
        console.log('✅ تمام آیتم‌های فوتر مثل کد شما');
    </script>
